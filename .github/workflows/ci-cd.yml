name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  BUILD_TIMEOUT_MS: 120000
  NODE_VERSION: '22'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Verify lockfile integrity
        run: |
          echo "deployment_id=$GITHUB_SHA" >> $GITHUB_OUTPUT
          npm ci --prefer-offline --no-audit

      - name: Type check
        run: npx tsc --noEmit

  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 5
    outputs:
      build_size: ${{ steps.build_size.outputs.size }}
      build_hash: ${{ steps.build_hash.outputs.hash }}
      deployment_id: ${{ steps.metadata.outputs.deployment_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build with timeout
        id: build
        run: |
          echo "[HEALTH_CHECK] Starting build with timeout ${{ env.BUILD_TIMEOUT_MS }}ms"
          timeout ${{ env.BUILD_TIMEOUT_MS }} npm run build
          echo "[HEALTH_CHECK] Build completed with exit code $?"

      - name: Verify build artifacts
        run: |
          echo "[HEALTH_CHECK] Verifying dist/index.html exists"
          if [ ! -f "dist/index.html" ]; then
            echo "[ERROR] Build artifact missing: dist/index.html"
            exit 1
          fi
          
          echo "[HEALTH_CHECK] Verifying valid HTML structure"
          if ! grep -q '<div id="root"></div>' dist/index.html; then
            echo "[ERROR] Invalid HTML structure: root element missing"
            exit 1
          fi
          
          echo "[HEALTH_CHECK] All build artifact checks passed"

      - name: Calculate build size
        id: build_size
        run: |
          SIZE=$(stat -c%s dist/index.html)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "[METRIC] build_size_bytes=$SIZE"
          
          if [ $SIZE -gt 1048576 ]; then
            echo "[ALERT] Build size exceeds 1MB threshold: $SIZE bytes"
          elif [ $SIZE -lt 10240 ]; then
            echo "[ALERT] Build size suspiciously small: $SIZE bytes"
          fi

      - name: Generate build hash
        id: build_hash
        run: |
          HASH=$(sha256sum dist/index.html | cut -d' ' -f1)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "$HASH  dist/index.html" > dist/index.html.sha256
          echo "[METRIC] build_hash=$HASH"

      - name: Set deployment metadata
        id: metadata
        run: |
          echo "deployment_id=$GITHUB_SHA" >> $GITHUB_OUTPUT
          echo "service_version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          echo "[METRIC] deployment_id=$GITHUB_SHA"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 3
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Verify build hash integrity
        run: |
          echo "[HEALTH_CHECK] Verifying SHA256 checksum"
          sha256sum -c dist/index.html.sha256
          echo "[HEALTH_CHECK] Checksum verified"

      - name: Install playwright for smoke test
        run: |
          npm install -g playwright
          playwright install chromium

      - name: Start static server and smoke test
        run: |
          echo "[HEALTH_CHECK] Starting static server for smoke test"
          python3 -m http.server 4173 --directory dist &
          SERVER_PID=$!
          sleep 2
          
          echo "[HEALTH_CHECK] Testing HTTP 200 response"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4173)
          if [ "$STATUS" != "200" ]; then
            echo "[ERROR] Smoke test failed: HTTP $STATUS"
            kill $SERVER_PID
            exit 1
          fi
          
          echo "[HEALTH_CHECK] Verifying expected content"
          if ! curl -s http://localhost:4173 | grep -q "ANT-SIM"; then
            echo "[ERROR] Smoke test failed: Expected content not found"
            kill $SERVER_PID
            exit 1
          fi
          
          kill $SERVER_PID
          echo "[HEALTH_CHECK] Smoke test passed"

      - name: Log smoke test metrics
        run: |
          echo "[METRIC] smoke_test_status=passed"
          echo "[METRIC] smoke_test_duration_ms=$(($(date +%s%N)/1000000 - START_TIME))"

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [build, smoke-test]
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Netlify Preview
        id: deploy
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './dist'
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Preview deploy from GitHub Actions"
          enable-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Verify preview deployment
        run: |
          echo "[HEALTH_CHECK] Verifying preview URL: ${{ steps.deploy.outputs.url }}"
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.url }}" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "[HEALTH_CHECK] Preview deployment verified: HTTP 200"
              echo "[METRIC] preview_deploy_status=success"
              exit 0
            fi
            echo "[HEALTH_CHECK] Attempt $i: HTTP $STATUS, retrying..."
            sleep 3
          done
          echo "[ERROR] Preview deployment health check failed after 10 attempts"
          echo "[METRIC] preview_deploy_status=failed"
          exit 1

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [build, smoke-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    timeout-minutes: 5
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Netlify Production
        id: deploy
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './dist'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Production deploy from GitHub Actions - ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Log deployment metrics
        run: |
          echo "[METRIC] deployment_id=${{ github.sha }}"
          echo "[METRIC] deployment_status=success"
          echo "[METRIC] service_version=$(node -p "require('./package.json').version")"
          echo "[METRIC] deployment_target=production"

      - name: Production health verification
        run: |
          echo "[HEALTH_CHECK] Waiting for DNS propagation..."
          sleep 10
          
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.url }}" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "[HEALTH_CHECK] Production deployment verified: HTTP 200"
              echo "[METRIC] production_health_check=passed"
              exit 0
            fi
            echo "[HEALTH_CHECK] Attempt $i: HTTP $STATUS, retrying..."
            sleep 5
          done
          
          echo "[ERROR] Production health check failed - initiating automatic rollback consideration"
          echo "[METRIC] production_health_check=failed"
          echo "[ALERT] Manual rollback may be required via Netlify dashboard"
          exit 1
